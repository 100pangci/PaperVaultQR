name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PAPERVAULTQR_VERSION: ${{ github.ref_name }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyzbar Pillow segno python-docx customtkinter numpy

      - name: 运行 Windows 打包脚本
        shell: cmd
        run: |
          call build_gui_exe.bat

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: PaperVaultQR-Windows-${{ github.ref_name }}
          path: release/PaperVaultQR-GUI-${{ github.ref_name }}.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyzbar Pillow segno python-docx customtkinter numpy

      - name: 运行 Linux 打包脚本
        run: |
          chmod +x build_gui_linux.sh
          ./build_gui_linux.sh

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: PaperVaultQR-Linux-${{ github.ref_name }}
          path: release/PaperVaultQR-GUI-${{ github.ref_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PaperVaultQR-Windows-${{ github.ref_name }}/PaperVaultQR-GUI-${{ github.ref_name }}.exe
            artifacts/PaperVaultQR-Linux-${{ github.ref_name }}/PaperVaultQR-GUI-${{ github.ref_name }}
          generate_release_notes: true
